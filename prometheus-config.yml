# Prometheus configuration for Hermis Agent
global:
  scrape_interval: 30s
  scrape_timeout: 10s
  evaluation_interval: 30s
  external_labels:
    cluster: 'hermis-agent'
    region: 'local'
    environment: 'production'

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - '/etc/prometheus/rules/*.yml'

scrape_configs:
  # Prometheus self
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # Docker host metrics
  - job_name: node-exporter
    static_configs:
      - targets: ['node-exporter:9100']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+)(?::\d+)?'
        replacement: '${1}'

  # Container metrics
  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: 'container_memory_failures_total'
        action: drop

  # Docker daemon metrics
  - job_name: docker
    static_configs:
      - targets: ['localhost:9323']
    metric_path: '/metrics'

  # Traefik metrics
  - job_name: traefik
    static_configs:
      - targets: ['traefik:8082']

  # PostgreSQL via postgres-exporter
  - job_name: postgres
    static_configs:
      - targets: ['postgres-exporter:9187']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'postgres'

  # Redis metrics via redis-exporter
  - job_name: redis
    static_configs:
      - targets: ['redis-exporter:9121']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'redis'

  # Ollama AI metrics
  - job_name: ollama
    static_configs:
      - targets: ['ollama:11434']
    metrics_path: '/metrics'
    scrape_interval: 15s

  # Qdrant vector database metrics
  - job_name: qdrant
    static_configs:
      - targets: ['qdrant:6333']
    metrics_path: '/metrics'

  # MinIO metrics
  - job_name: minio
    bearer_token: 'your-minio-bearer-token'
    static_configs:
      - targets: ['minio:9000']
    metrics_path: '/minio/v2/metrics/cluster'

  # Keycloak metrics
  - job_name: keycloak
    static_configs:
      - targets: ['keycloak:8080']
    metrics_path: '/metrics'

  # Service discovery for Docker containers
  - job_name: 'docker-containers'
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        target_label: container_name
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: compose_service
      - source_labels: [__address__]
        target_label: __address__
        regex: '([^:]+)(?::(\d+))?'
        replacement: '${1}:9090'
      - source_labels: [__meta_docker_container_label_prometheus_port]
        target_label: __address__
        regex: '^(.+)$'
        replacement: '${1}'

# Record rules for aggregation
recording_rules:
  - name: 'system'
    rules:
      - record: 'node:cpu:rate5m'
        expr: 'rate(node_cpu_seconds_total[5m])'
      - record: 'node:memory:percent'
        expr: '100 * (1 - ((node_memory_MemAvailable_bytes) / (node_memory_MemTotal_bytes)))'
      - record: 'node:disk:percent'
        expr: '100 * (1 - (node_filesystem_avail_bytes{fstype!="tmpfs"} / node_filesystem_size_bytes))'

  - name: 'docker'
    rules:
      - record: 'container:cpu:percent'
        expr: 'sum(rate(container_cpu_usage_seconds_total[5m])) by (container_name) * 100'
      - record: 'container:memory:percent'
        expr: 'sum(container_memory_usage_bytes) by (container_name) / sum(container_spec_memory_limit_bytes) by (container_name) * 100'

  - name: 'ai_inference'
    rules:
      - record: 'ollama:requests:rate5m'
        expr: 'rate(ollama_requests_total[5m])'
      - record: 'ollama:latency:p95'
        expr: 'histogram_quantile(0.95, rate(ollama_request_duration_seconds_bucket[5m]))'
      - record: 'qdrant:search:rate5m'
        expr: 'rate(qdrant_searches_total[5m])'
