services:
  # Reverse Proxy
  traefik:
    image: traefik:latest
    container_name: traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - TRAEFIK_API_INSECURE=true
      - TRAEFIK_METRICS_PROMETHEUS=true
      - TRAEFIK_ENTRYPOINTS_WEB_ADDRESS=:80
      - TRAEFIK_ENTRYPOINTS_WEBSECURE_ADDRESS=:443
      - TRAEFIK_PROVIDERS_DOCKER=true
      - TRAEFIK_PROVIDERS_DOCKER_EXPOSEDBYDEFAULT=false
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${HERMIS_ROOT}/config/traefik/traefik.yml:/traefik.yml:ro
      - ${HERMIS_ROOT}/data/traefik:/traefik
      - ${HERMIS_ROOT}/config/ssl:/ssl:ro
    networks:
      - hermis-internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`traefik.localhost`)"
      - "traefik.http.routers.api.service=api@internal"
      - "traefik.http.services.noop.loadbalancer.server.port=8080"
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Portainer - Container Management
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - hermis-internal
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${HERMIS_ROOT}/data/portainer:/data
    environment:
      ADMIN_PASSWORD: "${PORTAINER_PASSWORD}"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portainer.rule=Host(`portainer.localhost`)"
      - "traefik.http.services.portainer.loadbalancer.server.port=9000"
      - "traefik.http.middlewares.portainer-headers.headers.customrequestheaders.X-Script-Name=/portainer"

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - ${HERMIS_ROOT}/data/postgres:/var/lib/postgresql/data
    networks:
      - hermis-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=1GB"
      - "-c"
      - "maintenance_work_mem=64MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "default_statistics_target=100"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "work_mem=1310kB"
      - "-c"
      - "min_wal_size=1GB"
      - "-c"
      - "max_wal_size=4GB"
      - "-c"
      - "max_worker_processes=4"
      - "-c"
      - "max_parallel_workers_per_gather=2"
      - "-c"
      - "max_parallel_workers=4"

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    volumes:
      - ${HERMIS_ROOT}/data/redis:/data
    networks:
      - hermis-internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Ollama - Local LLM Inference
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    environment:
      OLLAMA_KEEP_ALIVE: 5m
      OLLAMA_NUM_PARALLEL: 1
      OLLAMA_NUM_THREAD: 4
    volumes:
      - ${HERMIS_ROOT}/models/ollama:/root/.ollama
      - ${HERMIS_ROOT}/data:/models
    networks:
      - hermis-ai
    ports:
      - "11434:11434"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ollama.rule=Host(`ollama.localhost`)"
      - "traefik.http.services.ollama.loadbalancer.server.port=11434"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 5s
      retries: 3

  # OpenWebUI - LLM Interface
  openwebui:
    image: ghcr.io/open-webui/open-webui:latest
    container_name: openwebui
    restart: unless-stopped
    environment:
      OLLAMA_API_BASE_URL: http://ollama:11434
      WEBUI_SECRET_KEY: "${OPENWEBUI_SECRET_KEY}"
      WEBUI_API_KEY: "${OPENWEBUI_API_KEY}"
    volumes:
      - ${HERMIS_ROOT}/data/openwebui:/app/backend/data
    networks:
      - hermis-ai
      - hermis-internal
    depends_on:
      - ollama
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.openwebui.rule=Host(`webui.localhost`)"
      - "traefik.http.services.openwebui.loadbalancer.server.port=8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Hermis AI Gateway - OpenAI-compatible API with RAG
  ai-gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
      # WSL fix: build over host network so pip can resolve DNS
      # (default bridge network can't reach the WSL NAT resolver)
      network: host
    image: hermis/ai-gateway:latest
    container_name: ai-gateway
    restart: unless-stopped
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      QDRANT_BASE_URL: http://qdrant:6333
      LOG_LEVEL: "${GATEWAY_LOG_LEVEL:-INFO}"
      ENABLE_RAG: "${GATEWAY_ENABLE_RAG:-true}"
      ENABLE_METRICS: "true"
      RATE_LIMIT: "${GATEWAY_RATE_LIMIT:-100}"
      REQUEST_TIMEOUT: "${GATEWAY_REQUEST_TIMEOUT:-300}"
    ports:
      - "5000:8000"
    networks:
      - hermis-ai
      - hermis-internal
    depends_on:
      - ollama
      - qdrant
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gateway.rule=Host(`api.localhost`)"
      - "traefik.http.services.gateway.loadbalancer.server.port=8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Qdrant - Vector Database for RAG
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    environment:
      QDRANT_API_KEY: "${QDRANT_API_KEY}"
    volumes:
      - ${HERMIS_ROOT}/data/qdrant:/qdrant/storage
    networks:
      - hermis-ai
    ports:
      - "6333:6333"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.qdrant.rule=Host(`qdrant.localhost`)"
      - "traefik.http.services.qdrant.loadbalancer.server.port=6333"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # MinIO - S3-compatible Object Storage
  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD}"
    volumes:
      - ${HERMIS_ROOT}/data/minio:/minio_data
    networks:
      - hermis-internal
    ports:
      - "9000:9000"
      - "9001:9001"
    command: minio server /minio_data --console-address :9001
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.minio-api.rule=Host(`minio.localhost`)"
      - "traefik.http.services.minio-api.loadbalancer.server.port=9000"
      - "traefik.http.routers.minio-console.rule=Host(`minio-console.localhost`)"
      - "traefik.http.services.minio-console.loadbalancer.server.port=9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Prometheus - Metrics Collection
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    user: "1000"
    volumes:
      - ${HERMIS_ROOT}/config/prometheus:/etc/prometheus
      - ${HERMIS_ROOT}/data/prometheus:/prometheus
    networks:
      - hermis-monitoring
      - hermis-internal
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prometheus.rule=Host(`prometheus.localhost`)"
      - "traefik.http.services.prometheus.loadbalancer.server.port=9090"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Grafana - Visualization
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    user: "1000"
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD}"
      GF_INSTALL_PLUGINS: "grafana-worldmap-panel,grafana-piechart-panel"
      GF_SERVER_ROOT_URL: "http://grafana.localhost"
      GF_SECURITY_SECRET_KEY: "${GRAFANA_SECRET_KEY}"
    volumes:
      - ${HERMIS_ROOT}/data/grafana:/var/lib/grafana
      - ${HERMIS_ROOT}/config/grafana:/etc/grafana
    networks:
      - hermis-monitoring
      - hermis-internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.localhost`)"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Loki - Log Aggregation
  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: unless-stopped
    user: "1000"
    volumes:
      - ${HERMIS_ROOT}/config/loki:/etc/loki
      - ${HERMIS_ROOT}/data/loki:/loki
    networks:
      - hermis-monitoring
    command: -config.file=/etc/loki/loki-config.yml
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Promtail - Log Shipper
  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    restart: unless-stopped
    volumes:
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HERMIS_ROOT}/config/promtail:/etc/promtail
    networks:
      - hermis-monitoring
    command: -config.file=/etc/promtail/promtail-config.yml
    depends_on:
      - loki

  # cAdvisor - Container Metrics
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - hermis-monitoring
    ports:
      - "8081:8080"

  # Node Exporter - System Metrics
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    networks:
      - hermis-monitoring
    ports:
      - "9100:9100"

  # Keycloak - Authentication
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak
    restart: unless-stopped
    environment:
      KEYCLOAK_ADMIN: "${KEYCLOAK_ADMIN}"
      KEYCLOAK_ADMIN_PASSWORD: "${KEYCLOAK_ADMIN_PASSWORD}"
      KC_DB: postgres
      KC_DB_URL: "jdbc:postgresql://postgres:5432/keycloak"
      KC_DB_USERNAME: "${POSTGRES_USER}"
      KC_DB_PASSWORD: "${POSTGRES_PASSWORD}"
      KC_HOSTNAME: keycloak.localhost
      KC_PROXY: edge
    volumes:
      - ${HERMIS_ROOT}/data/keycloak:/opt/keycloak/data
    networks:
      - hermis-internal
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.keycloak.rule=Host(`keycloak.localhost`)"
      - "traefik.http.services.keycloak.loadbalancer.server.port=8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 3

  # HashiCorp Vault - Secrets Management
  vault:
    image: hashicorp/vault:latest
    container_name: vault
    restart: unless-stopped
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "${VAULT_DEV_ROOT_TOKEN_ID}"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    volumes:
      - ${HERMIS_ROOT}/data/vault:/vault/data
      - ${HERMIS_ROOT}/config/vault:/vault/config
    networks:
      - hermis-internal
    cap_add:
      - IPC_LOCK
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vault.rule=Host(`vault.localhost`)"
      - "traefik.http.services.vault.loadbalancer.server.port=8200"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8200/v1/sys/health"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  hermis-internal:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: br-hermis-internal
  hermis-ai:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: br-hermis-ai
  hermis-monitoring:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: br-hermis-monitoring
