# Loki configuration for Hermis Agent - Log aggregation
auth_enabled: false

ingester:
  chunk_idle_period: 3m
  chunk_retain_period: 1m
  max_chunk_age: 1h
  max_streams_matching_max_bytes: 10485760
  max_streams_matching_max_age: 0s
  chunk_encoding: snappy
  chunk_size_bytes: 1048576

limits_config:
  enforce_metric_name: false
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  ingestion_rate_mb: 100
  ingestion_burst_size_mb: 150
  max_cache_freshness_per_query: 10m
  split_queries_by_line: true
  max_query_length: 721h
  max_query_lookback: 30d
  max_line_size: 8388608
  max_entries_limit_per_minute: 100000
  retention_period: 30d

schema_config:
  configs:
    - from: 2020-10-24
      store: boltdb-shipper
      object_store: filesystem
      schema: v11
      index:
        prefix: index_
        period: 24h

server:
  http_listen_port: 3100
  log_level: info
  log_format: json
  grpc_listen_port: 9096

storage_config:
  boltdb_shipper:
    active_index_directory: /loki/boltdb-shipper-active
    cache_location: /loki/boltdb-shipper-cache
    shared_store: filesystem
  filesystem:
    directory: /loki/chunks

chunk_store_config:
  max_look_back_period: 0s

table_manager:
  poll_interval: 10m
  retention_deletes_enabled: false
  retention_period: 0s

ruler:
  enable_api: true
  alertmanager_url: http://alertmanager:9093
  rule_path: /loki/rules
  ring:
    kvstore:
      store: inmemory
  rule_groups:
    - name: ai_inference_alerts
      interval: 5m
      rules:
        - alert: HighModelLatency
          expr: 'histogram_quantile(0.95, ollama_request_duration_seconds_bucket) > 5'
          for: 5m
          annotations:
            summary: 'High model latency detected'
            description: 'Model latency P95 is above 5 seconds'

        - alert: ModelInferenceErrors
          expr: 'rate(ollama_errors_total[5m]) > 0.1'
          for: 2m
          annotations:
            summary: 'Model inference errors detected'
            description: 'Error rate is above 10% in the last 5 minutes'

        - alert: LowVectorDBHealth
          expr: 'qdrant_status != 1'
          for: 1m
          annotations:
            summary: 'Vector database health check failed'
            description: 'Qdrant is not responding correctly'

    - name: system_alerts
      interval: 5m
      rules:
        - alert: HighMemoryUsage
          expr: 'node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes < 0.1'
          for: 5m
          annotations:
            summary: 'High memory usage detected'
            description: 'Less than 10% memory available'

        - alert: DiskSpaceLow
          expr: 'node_filesystem_avail_bytes{fstype!="tmpfs"} / node_filesystem_size_bytes < 0.1'
          for: 5m
          annotations:
            summary: 'Low disk space'
            description: 'Less than 10% disk space available'

        - alert: HighCPUUsage
          expr: 'rate(node_cpu_seconds_total[5m]) > 0.8'
          for: 5m
          annotations:
            summary: 'High CPU usage'
            description: 'CPU usage is above 80%'

    - name: service_alerts
      interval: 5m
      rules:
        - alert: ServiceDown
          expr: 'up == 0'
          for: 1m
          annotations:
            summary: 'Service is down'
            description: 'Service {{ $labels.job }} is not responding'

        - alert: ContainerRestartFrequency
          expr: 'rate(container_last_seen[5m]) > 0.1'
          for: 5m
          annotations:
            summary: 'Container restarting frequently'
            description: 'Container {{ $labels.container_name }} is restarting frequently'
